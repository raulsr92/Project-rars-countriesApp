<country-search-input
 (inputValue)="query.set($event)"
 placeholderInput="Buscar por país"
/>


@if (countryResource.error()) {

    <h2 class="text-red-600 mt-3">{{ countryResource.error()}}</h2>

}

@if (countryResource.hasValue()) {

  <country-list [countriesInput]="countryResource.value()"/>

}
